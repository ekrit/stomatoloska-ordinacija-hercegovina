publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  fl_chart: ^0.69.0
  file_picker: ^8.1.7
  intl: ^0.19.0
  path_provider: ^2.1.5
  soh_api:
    path: packages/soh_api
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  openapi_generator: ^6.1.0
  openapi_generator_cli: ^6.1.0

flutter:
  uses-material-design: true
