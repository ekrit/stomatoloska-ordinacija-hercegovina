services:
  soh-sql:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL__PASSWORD}
      - MSSQL_PID=${SQL__PID}
    ports:
      - "1401:1433"
    expose:
      - 1433
    networks:
      - soh-2025

  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ__USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ__PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    expose:
      - 5672
    networks:
      - soh-2025

  soh-subscriber:
    image: soh-subscriber:1.0.0
    container_name: soh-subscriber
    restart: on-failure
    build:
      context: .
      dockerfile: Dockerfile.notifications
    environment:
      - RABBITMQ_HOST=${RABBITMQ__HOST}
      - RABBITMQ_USERNAME=${RABBITMQ__USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ__PASSWORD}
      - RABBITMQ_VIRTUALHOST=/
      - SMTP__HOST=${SMTP__HOST:-smtp.gmail.com}
      - SMTP__PORT=${SMTP__PORT:-587}
      - SMTP__ENABLESSL=${SMTP__ENABLESSL:-true}
      - SMTP__USERNAME=${SMTP__USERNAME:-}
      - SMTP__PASSWORD=${SMTP__PASSWORD:-}
      - SMTP__FROM=${SMTP__FROM:-}
      - APPOINTMENT_REMINDER_RECIPIENTS=${APPOINTMENT_REMINDER_RECIPIENTS:-}
    depends_on:
      - rabbitmq
      - soh-sql
      - soh-api
    networks:
      - soh-2025
    ports:
      - 7111:80

  soh-api:
    image: soh-api:1.0.0
    container_name: soh-api
    build:
      context: .
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings:DefaultConnection=Server=soh-sql,1433;Database=${SQL__DATABASE};User Id=${SQL__USER};Password=${SQL__PASSWORD};ConnectRetryCount=0;TrustServerCertificate=True;
      - RABBITMQ_HOST=${RABBITMQ__HOST}
      - RABBITMQ_USERNAME=${RABBITMQ__USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ__PASSWORD}
      - RABBITMQ_VIRTUALHOST=/
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - JwtSettings__Issuer=${JwtSettings__Issuer:-SOH.WebAPI}
      - JwtSettings__Audience=${JwtSettings__Audience:-SOH.App}
      - JwtSettings__ExpirationMinutes=${JwtSettings__ExpirationMinutes:-60}
    ports:
      - "5130:5130"
    networks:
      - soh-2025
    depends_on:
      - soh-sql

networks:
  soh-2025:
    driver: bridge